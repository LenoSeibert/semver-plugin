name: Version

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semver:
    name: Validate SemVer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version files
        run: node scripts/check-version.js
