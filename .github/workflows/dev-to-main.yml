name: Check dev promotion

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-to-main
  cancel-in-progress: false

jobs:
  promote:
    name: Validate dev promotion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Validate version
        run: node scripts/check-version.js

      - name: Check promotion diff
        id: promotion
        run: |
          set -euo pipefail

          git fetch origin main dev

          if git diff --quiet origin/main...origin/dev; then
            echo "dev is already in sync with main."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show promotion link
        if: steps.promotion.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          echo "dev is ready to promote to main."
          echo "Open the pull request at: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/main...dev?quick_pull=1"
